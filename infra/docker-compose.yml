name: low-latency-market-data-platform

services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: market_ops
      POSTGRES_USER: market_ops
      POSTGRES_PASSWORD: market_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../observability/otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  feed-handler:
    build:
      context: ..
      dockerfile: infra/python-service.Dockerfile
    command: ["python", "-m", "market_platform.services.feed_handler"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      - redpanda
    restart: unless-stopped

  stream-processor:
    build:
      context: ..
      dockerfile: infra/python-service.Dockerfile
    command: ["python", "-m", "market_platform.services.stream_processor"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redpanda
      - redis
    restart: unless-stopped

  flink-jobmanager:
    profiles: ["flink"]
    build:
      context: ..
      dockerfile: infra/flink-job.Dockerfile
    command: ["standalone-job", "--job-classname", "com.marketplatform.flink.MarketStateJob"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    ports:
      - "8081:8081"
    depends_on:
      - redpanda
      - redis

  flink-taskmanager:
    profiles: ["flink"]
    build:
      context: ..
      dockerfile: infra/flink-job.Dockerfile
    command: ["taskmanager"]
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    depends_on:
      - flink-jobmanager

  market-data-api:
    build:
      context: ..
      dockerfile: infra/python-service.Dockerfile
    command: ["python", "-m", "market_platform.services.market_data_api"]
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  feed-simulator:
    build:
      context: ..
      dockerfile: infra/python-service.Dockerfile
    command: ["python", "-m", "market_platform.services.feed_simulator"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SYMBOLS: AAPL,MSFT,NVDA,TSLA
      EXCHANGE: XNAS
    depends_on:
      - redpanda
    restart: unless-stopped

volumes:
  postgres-data:
