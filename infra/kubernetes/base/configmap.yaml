apiVersion: v1
kind: ConfigMap
metadata:
  name: market-platform-config
  namespace: market-data
data:
  EXCHANGE: XNAS
  SYMBOLS: AAPL,MSFT,NVDA,TSLA
  KAFKA_BOOTSTRAP_SERVERS: managed-kafka-bootstrap:9092
  REDIS_URL: redis://managed-redis:6379/0
  DATABRICKS_CATALOG: market_data
  DATABRICKS_SCHEMA: research
  LAKEHOUSE_BASE_PATH: dbfs:/prod/low_latency_market_data_platform/delta
  LAKEHOUSE_CHECKPOINT_PATH: dbfs:/prod/low_latency_market_data_platform/checkpoints
