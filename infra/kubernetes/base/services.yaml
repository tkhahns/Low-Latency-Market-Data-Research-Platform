apiVersion: v1
kind: Service
metadata:
  name: market-data-api
  namespace: market-data
spec:
  type: ClusterIP
  selector:
    app: market-data-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-ops-server
  namespace: market-data
spec:
  type: ClusterIP
  selector:
    app: mcp-ops-server
  ports:
    - name: http
      port: 8010
      targetPort: http
